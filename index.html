```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Challenge Wheel</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;

}

    margin-top:20px;

    background:#ff4c4c;

    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🍽 Country Food Challenge</h1>

<canvas id="wheel" width="700" height="700"></canvas>

<br>
<button onclick="spin()">Spin the Wheel</button>

<div id="result"></div>

<script>

// FULL COUNTRY LIST
let countries = [
"Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia",
"Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium",
"Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria",
"Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Chad","Chile","China","Colombia","Costa Rica",
"Croatia","Cuba","Cyprus","Czechia","Denmark","Dominican Republic","Ecuador","Egypt","El Salvador",
"Estonia","Ethiopia","Finland","France","Gabon","Georgia","Germany","Ghana","Greece","Guatemala",
"Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy",
"Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon",
"Lithuania","Luxembourg","Madagascar","Malaysia","Maldives","Mali","Malta","Mexico","Moldova",
"Mongolia","Morocco","Myanmar","Nepal","Netherlands","New Zealand","Nicaragua","Nigeria",
"North Korea","North Macedonia","Norway","Oman","Pakistan","Panama","Paraguay","Peru","Philippines",
"Poland","Portugal","Qatar","Romania","Russia","Saudi Arabia","Senegal","Serbia","Singapore",
"Slovakia","Slovenia","Somalia","South Africa","South Korea","Spain","Sri Lanka","Sudan","Sweden",
"Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Tunisia","Turkey","Uganda",
"Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan",
"Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
];

// previously spun countries
let spun = JSON.parse(localStorage.getItem('spunCountries') || '[]');
countries = countries.filter(c => !spun.includes(c));

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');

const centerX = canvas.width/2;
const centerY = canvas.height/2;
const radius = canvas.width/2 - 20;

let currentAngle = 0;
let spinning = false;

const colors = [
"#FF6B6B",
"#FFD93D",
"#6BCB77",
"#4D96FF",
"#9D4EDD",
"#FF9F1C"
];

function drawWheel(){

    const arc = (2*Math.PI)/countries.length;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    countries.forEach((country,i)=>{

        const start = currentAngle + i*arc;
        const end = start + arc;

        ctx.beginPath();
        ctx.moveTo(centerX,centerY);
        ctx.arc(centerX,centerY,radius,start,end);
        ctx.closePath();

        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();

        ctx.strokeStyle="white";
        ctx.lineWidth=1;
        ctx.stroke();

        // only show some labels when there are many countries
        let labelStep = Math.ceil(countries.length / 30);

        if(i % labelStep === 0){

            ctx.save();
            ctx.translate(centerX,centerY);
            ctx.rotate(start + arc/2);

            ctx.textAlign="right";
            ctx.fillStyle="black";
            ctx.font="10px Arial";

            ctx.fillText(country,radius-40,4);

            ctx.restore();
        }

    });

    // pointer
    ctx.fillStyle="#c0392b";

    ctx.beginPath();
    ctx.moveTo(centerX,15);
    ctx.lineTo(centerX-20,55);
    ctx.lineTo(centerX+20,55);
    ctx.closePath();
    ctx.fill();
}

function spin(){

    if(spinning || countries.length===0) return;

    spinning = true;

    const spins = 5 + Math.random()*5;
    const spinAngle = spins * 2*Math.PI;

    const duration = 6000;
    const startTime = performance.now();

    function animate(time){

        let progress = (time - startTime)/duration;

        if(progress > 1) progress = 1;

        const ease = 1 - Math.pow(1-progress,4);

        currentAngle = spinAngle * ease;

        drawWheel();

        if(progress < 1){

            requestAnimationFrame(animate);

        }else{

            spinning=false;

            let finalAngle = currentAngle % (2*Math.PI);

            let pointerAngle = 3*Math.PI/2;

            let adjusted = (pointerAngle - finalAngle + 2*Math.PI) % (2*Math.PI);

            let index = Math.floor(adjusted / ((2*Math.PI)/countries.length));

            let winner = countries[index];

            document.getElementById("result").textContent =
            "🍽 Go eat food from: " + winner;

            spun.push(winner);
            localStorage.setItem("spunCountries",JSON.stringify(spun));
        }
    }

    requestAnimationFrame(animate);
}

drawWheel();

</script>

</body>
</html>
