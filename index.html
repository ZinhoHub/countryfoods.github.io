<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Eats Spinner</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <h1>Country Spinner</h1>
        <div class="theme-switch-container">
            <label class="theme-toggle">
                <input type="checkbox" id="theme-toggle">
                <span class="slider">
                    <span class="knob">
                        <span class="icon sun">☀️</span>
                        <span class="icon moon">🌙</span>
                    </span>
                </span>
            </label>
        </div>
    </header>

    <div class="progress-container">
        <div class="progress-info">
            <span>World Exploration</span>
            <span id="progress-percent">0/195</span>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <nav class="tab-nav">
        <button id="tab-wheel" class="tab-btn active">🎯 Wheel</button>
        <button id="tab-diary" class="tab-btn">🍽️ Add Review</button>
        <button id="tab-history" class="tab-btn">📖 Logs</button>
        <button id="tab-rankings" class="tab-btn">🏆 Rankings</button>
        <button id="tab-stats" class="tab-btn">📊 Stats</button>
    </nav>

    <main id="wheel-section" class="content-section">
        <div class="wheel-wrapper">
            <div class="pointer-fixed"></div>
            <div class="wheel-container">
                <canvas id="wheel" width="520" height="520"></canvas>
            </div>
            <button id="btn-spin" class="spin-button">SPIN</button>
        </div>
        <button id="btn-reset">Reset Spun Countries</button>
    </main>

    <main id="history-section" class="content-section hidden">
        <h2>Review History</h2>
        <div id="diary-display" class="diary-grid"></div>
    </main>

    <main id="diary-section" class="content-section hidden">
        <div class="vertical-form">
            <label for="log-country">Which Country?</label>
            <input type="text" id="log-country" list="country-options" placeholder="Search countries...">
            <datalist id="country-options"></datalist>

            <label for="log-date">Date Visited</label>
            <input type="date" id="log-date">

            <label for="log-restaurant">Restaurant Name</label>
            <input type="text" id="log-restaurant" placeholder="e.g. Din Tai Fung">

            <div class="rating-grid">
                <div class="rating-pod">
                    <div class="pod-label">Food</div>
                    <div class="pod-value"><span id="val-food">5.0</span></div>
                    <input type="range" id="rate-food" min="1" max="10" step="0.5" value="5">
                </div>
                <div class="rating-pod">
                    <div class="pod-label">Service</div>
                    <div class="pod-value"><span id="val-service">5.0</span></div>
                    <input type="range" id="rate-service" min="1" max="10" step="0.5" value="5">
                </div>
                <div class="rating-pod">
                    <div class="pod-label">Vibe</div>
                    <div class="pod-value"><span id="val-vibe">5.0</span></div>
                    <input type="range" id="rate-vibe" min="1" max="10" step="0.5" value="5">
                </div>
            </div>

            <div class="overall-score-display" id="overall-box">
                Overall: <span id="overall-score">5.0</span> / 10
            </div>

            <label for="log-notes">Notes</label>
            <textarea id="log-notes" rows="3" placeholder="What was the best dish?"></textarea>

            <button id="btn-save-log" style="background: #27ae60; margin-top: 10px; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer;">Save Review</button>
        </div>
    </main>

    <main id="rankings-section" class="content-section hidden">
        <div class="rank-selector">
            <button class="rank-opt active" onclick="updateRank('overall')">Overall</button>
            <button class="rank-opt" onclick="updateRank('food')">Food</button>
            <button class="rank-opt" onclick="updateRank('service')">Service</button>
            <button class="rank-opt" onclick="updateRank('vibe')">Vibe</button>
        </div>
        <div id="rankings-list" class="diary-grid"></div>
    </main>

    <main id="stats-section" class="content-section hidden">
        <h2 style="text-align: center; margin-bottom: 20px;">Palate Insights</h2>
        
        <div id="map" style="width: 90%; height: 350px; margin: 0 auto 20px auto; border-radius: 20px;"></div>

        <div class="stats-grid">
            <div class="stat-card" style="grid-column: span 2;">
                <h3>Global Avg</h3>
                <div id="stat-avg-rating" class="stat-value">0.0</div>
                <small>Score Across All Meals</small>
            </div>
            <div class="stat-card">
                <h3>Best Continent</h3>
                <div id="stat-best-continent" class="stat-value">-</div>
                <small>Highest Rating Average</small>
            </div>
            <div class="stat-card">
                <h3>Most Visited</h3>
                <div id="stat-most-visited" class="stat-value">-</div>
                <small>Favorite Region</small>
            </div>
        </div>

        <div id="continent-averages" class="continent-list-container"></div>
    </main>

    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <h2 id="popupCountry">Country</h2>
            <img id="popupFlag" src="" alt="Flag">
            <button id="btn-close">Great!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
