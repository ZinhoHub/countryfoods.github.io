<script>
// Full list of countries (approx. 195 sovereign states + common territories)
// You can remove any you don't want (e.g. non-restaurant countries)
let countries = [
  "Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Antigua and Barbuda", "Argentina", "Armenia",
  "Australia", "Austria", "Azerbaijan", "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium",
  "Belize", "Benin", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria",
  "Burkina Faso", "Burundi", "Cabo Verde", "Cambodia", "Cameroon", "Canada", "Central African Republic", "Chad",
  "Chile", "China", "Colombia", "Comoros", "Congo (Congo-Brazzaville)", "Costa Rica", "Croatia", "Cuba", "Cyprus",
  "Czechia (Czech Republic)", "Denmark", "Djibouti", "Dominica", "Dominican Republic", "Ecuador", "Egypt",
  "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini", "Ethiopia", "Fiji", "Finland", "France",
  "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guinea-Bissau",
  "Guyana", "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel",
  "Italy", "Jamaica", "Japan", "Jordan", "Kazakhstan", "Kenya", "Kiribati", "Korea (North)", "Korea (South)",
  "Kosovo", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein",
  "Lithuania", "Luxembourg", "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands",
  "Mauritania", "Mauritius", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco",
  "Mozambique", "Myanmar", "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Niger",
  "Nigeria", "North Macedonia", "Norway", "Oman", "Pakistan", "Palau", "Palestine", "Panama", "Papua New Guinea",
  "Paraguay", "Peru", "Philippines", "Poland", "Portugal", "Qatar", "Romania", "Russia", "Rwanda", "Saint Kitts and Nevis",
  "Saint Lucia", "Saint Vincent and the Grenadines", "Samoa", "San Marino", "Sao Tome and Principe", "Saudi Arabia",
  "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Solomon Islands", "Somalia",
  "South Africa", "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria", "Taiwan",
  "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey",
  "Turkmenistan", "Tuvalu", "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay",
  "Uzbekistan", "Vanuatu", "Vatican City", "Venezuela", "Vietnam", "Yemen", "Zambia", "Zimbabwe"
];

// Load previously spun countries from localStorage and remove them
let spun = JSON.parse(localStorage.getItem('spunCountries') || '[]');
countries = countries.filter(c => !spun.includes(c));

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const centerX = canvas.width / 2;
const centerY = canvas.height / 2;
const radius = canvas.width / 2 - 10;
let currentAngle = 0;
let spinning = false;

function drawWheel() {
  if (countries.length === 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = 'red';
    ctx.textAlign = 'center';
    ctx.fillText("All countries spun!", centerX, centerY);
    return;
  }

  const arc = (2 * Math.PI) / countries.length;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  countries.forEach((country, i) => {
    const startAngle = currentAngle + i * arc;
    const endAngle = currentAngle + (i + 1) * arc;

    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
    ctx.closePath();

    // Alternating colors for better contrast
    ctx.fillStyle = i % 2 === 0 ? '#FF6B6B' : '#4ECDC4';
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text - rotated to fit nicely
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'black';
    ctx.font = 'bold 13px Arial';
    ctx.fillText(country, radius - 15, 5);
    ctx.restore();
  });

  // Fixed pointer (red triangle at TOP / 12 o'clock position)
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(centerX, 20);               // Tip
  ctx.lineTo(centerX - 20, 60);          // Left base
  ctx.lineTo(centerX + 20, 60);          // Right base
  ctx.closePath();
  ctx.fill();
}

function spin() {
  if (spinning || countries.length === 0) return;
  spinning = true;
  document.getElementById('result').textContent = '';

  const fullSpins = 5 + Math.floor(Math.random() * 6);  // 5-10 full spins
  const extraDegrees = Math.random() * 360;
  const totalRotation = (fullSpins * 360) + extraDegrees;
  const duration = 5000 + Math.random() * 3000;  // 5-8 sec
  const startTime = performance.now();

  function animate(time) {
    const elapsed = time - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);  // Stronger ease-out

    currentAngle = (totalRotation * ease) * (Math.PI / 180);
    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;

      // Calculate winner: angle from top pointer (0 degrees)
      let finalAngle = (currentAngle * 180 / Math.PI) % 360;
      if (finalAngle < 0) finalAngle += 360;

      const sliceSize = 360 / countries.length;
      // Key fix: Invert direction + offset to match top pointer
      let winnerIndex = Math.floor((360 - finalAngle) / sliceSize) % countries.length;

      const winner = countries[winnerIndex];

      document.getElementById('result').textContent = `Landed on: ${winner}! Go eat! 🍽️`;
      console.log(`Winner: ${winner} (index ${winnerIndex}, finalAngle ${finalAngle.toFixed(1)}°)`);

      // Remove and save
      spun.push(winner);
      localStorage.setItem('spunCountries', JSON.stringify(spun));
      countries = countries.filter(c => !spun.includes(c));
      drawWheel();
    }
  }

  requestAnimationFrame(animate);
}

drawWheel();  // initial draw
</script>
