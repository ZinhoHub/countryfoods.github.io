<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Spinner Wheel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Country Spinner</h1>

    <!-- Theme toggle – top right -->
    <div class="theme-toggle-wrapper">
        <label class="theme-toggle">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider">
                <span class="icon sun">☀️</span>
                <span class="icon moon">🌙</span>
                <span class="knob"></span>
            </span>
        </label>
    </div>

    <!-- Wheel wrapper -->
    <div class="wheel-wrapper">
        <!-- Animated wheel only -->
        <div class="wheel-container">
            <canvas id="wheel" width="520" height="520"></canvas>
        </div>

        <!-- Fixed pointer – does NOT rotate -->
        <div class="pointer-fixed"></div>

        <!-- Spin button – fixed in center -->
        <button id="btn-spin" class="spin-button">Spin</button>
    </div>

    <div class="controls">
        <button id="btn-reset">Reset Game</button>
    </div>

    <!-- Popup -->
    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <h2 id="popupCountry"></h2>
            <img id="popupFlag" src="" alt="Country Flag">
            <button id="btn-close">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
